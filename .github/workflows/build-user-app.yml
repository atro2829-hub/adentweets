name: Build User App APK

on:
  push:
    branches: [ main ]
    paths:
      - 'user_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create Android project structure
        working-directory: user_app
        run: |
          # Backup our custom files
          cp pubspec.yaml /tmp/pubspec.yaml
          # Create proper Android project structure
          flutter create . --org com.adentweets --project-name adentweets --platforms android
          # Restore our pubspec with all dependencies
          cp /tmp/pubspec.yaml pubspec.yaml
          # Copy google-services.json
          cp android/app/google-services.json /tmp/google-services.json 2>/dev/null || true
          flutter create . --org com.adentweets --project-name adentweets --platforms android
          cp /tmp/google-services.json android/app/google-services.json 2>/dev/null || true

      - name: Get Flutter dependencies
        working-directory: user_app
        run: flutter pub get

      - name: Build APK
        working-directory: user_app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdenTweets-User-App-APK
          path: user_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag: user-v1.0.0-${{ github.run_number }}
          name: "AdenTweets User App v1.0.0 Build #${{ github.run_number }}"
          files: user_app/build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}