name: adentweets_admin
description: AdenTweets Admin - Social Media Platform Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_database: ^10.4.9
  flutter_riverpod: ^2.4.11
  go_router: ^13.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  timeago: ^3.6.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/