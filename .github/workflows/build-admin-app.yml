name: Build Admin App APK

on:
  push:
    branches: [ main ]
    paths:
      - 'admin_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Prepare Android project
        working-directory: admin_app
        run: |
          # Backup custom files
          cp pubspec.yaml /tmp/admin_pubspec.yaml
          cp android/app/google-services.json /tmp/admin_google_services.json
          # Remove old android directory completely
          rm -rf android
          # Generate fresh v2 Android project
          flutter create . --org com.adentweets.admin --project-name adentweets_admin --platforms android
          # Restore custom pubspec with all dependencies
          cp /tmp/admin_pubspec.yaml pubspec.yaml
          # Copy back google-services.json
          mkdir -p android/app
          cp /tmp/admin_google_services.json android/app/google-services.json

      - name: Get Flutter dependencies
        working-directory: admin_app
        run: flutter pub get

      - name: Build APK
        working-directory: admin_app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdenTweets-Admin-App-APK
          path: admin_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag: admin-v1.0.0-${{ github.run_number }}
          name: "AdenTweets Admin App v1.0.0 Build #${{ github.run_number }}"
          files: admin_app/build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}