name: adentweets
description: AdenTweets - Social Media Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_database: ^10.4.9
  firebase_messaging: ^14.7.9
  google_sign_in: ^6.2.1
  flutter_riverpod: ^2.4.11
  go_router: ^13.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  timeago: ^3.6.1
  provider: ^6.1.2
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/